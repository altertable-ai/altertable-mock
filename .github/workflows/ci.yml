name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Check code quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust toolchain fingerprint
        id: rust
        run: echo "fingerprint=$(rustc -vV | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-${{ runner.os }}-${{ steps.rust.outputs.fingerprint }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-${{ steps.rust.outputs.fingerprint }}-

      - name: Lint
        run: |
          cargo fmt -- --check
          cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets
